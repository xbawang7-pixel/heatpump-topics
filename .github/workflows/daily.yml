name: 每日热泵选题更新

on:
  schedule:
    # UTC 00:00 = 北京时间 08:00
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 判断是否抓Reddit
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            echo "RUN_REDDIT=true" >> "$GITHUB_ENV"
          else
            echo "RUN_REDDIT=false" >> "$GITHUB_ENV"
          fi

      - name: 收集候选话题
        env:
          LOOKBACK_HOURS: "168"
          PYTHONUNBUFFERED: "1"
          RSS_REQUEST_TIMEOUT: "20"
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python scripts/collect_candidates.py

      - name: 过滤Reddit低价值候选
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/filter_candidates.py

      - name: 更新新闻榜
        run: python scripts/update_news_bank.py

      - name: 更新Reddit专业榜
        run: python scripts/update_reddit_bank.py

      - name: 更新同行动态榜
        run: python scripts/update_competitor_bank.py

      - name: 用 LLM 补充话题信息
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/enrich_topics.py

      - name: 渲染首页
        run: python scripts/render_home.py

      - name: 渲染新闻榜
        run: python scripts/render_news.py

      - name: 渲染Reddit专业榜
        run: python scripts/render_reddit.py

      - name: 渲染同行动态榜
        run: python scripts/render_competitors.py

      - name: 渲染精选清单
        run: python scripts/render_weekly_picks.py

      - name: 渲染关键词库网页
        run: python scripts/render_keywords.py

      - name: 渲染论坛趣味帖网页
        run: python scripts/render_humor.py

      - name: 提交更新
        run: |
          git config user.name "heatpump-topics-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/
          git diff --quiet --cached || git commit -m "每日选题更新 $(date -u +%Y-%m-%d)"
          git push
